<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a2a;
    --easy: #4ade80;
    --quality: #fb923c;
    --strength: #818cf8;
    --long: #38bdf8;
    --rest: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
    padding-bottom: max(40px, env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
  }

  header {
    padding-top: max(20px, calc(env(safe-area-inset-top) + 12px));
  }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 16px;
  }

  .plan-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    letter-spacing: 0.03em;
    color: var(--accent);
  }

  .plan-subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .race-badge {
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    text-align: right;
    line-height: 1.3;
  }

  .race-badge small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  /* Week selector */
  .week-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 16px 2px;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .week-btn {
    flex-shrink: 0;
    background: var(--border);
    border: 1.5px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    position: relative;
  }

  .week-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .week-btn.current-week::after {
    content: '';
    position: absolute;
    top: -3px;
    right: -3px;
    width: 7px;
    height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    border: 1.5px solid var(--bg);
  }

  .week-btn.cutback {
    border-color: #444;
  }

  /* Main content */
  main {
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }

  .meta-bar {
    padding: 12px 16px 0;
  }

  /* Slide viewport */
  .slide-viewport {
    overflow: hidden;
    position: relative;
  }

  .slide-track {
    display: flex;
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .slide-track.no-transition {
    transition: none !important;
  }

  .slide-page {
    flex-shrink: 0;
    width: 100%;
    padding: 0 16px 40px;
  }

  /* Swipe hint arrows */
  .swipe-hint {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px 2px;
  }
  .swipe-arrow {
    font-size: 0.7rem;
    color: #3a3a3a;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    transition: color 0.2s;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    user-select: none;
  }
  .swipe-arrow:hover { color: var(--muted); }
  .swipe-arrow.hidden { opacity: 0; pointer-events: none; }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  .week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .week-tag {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 9px;
    border-radius: 12px;
    background: var(--border);
    color: var(--muted);
  }

  .week-tag.cutback { background: #2a2218; color: #f59e0b; }
  .week-tag.taper { background: #1a2a1a; color: var(--easy); }
  .week-tag.race { background: #1a1a2a; color: #a78bfa; }

  /* Day cards */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .day-card:active { border-color: #444; }

  .day-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
  }

  .day-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .day-name-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .day-name {
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.01em;
  }

  .day-date {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .day-type {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .day-content {
    padding: 0 14px 14px 36px;
  }

  .session-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
    font-weight: 400;
  }

  .session-text.rest-text {
    color: var(--muted);
    font-style: italic;
    font-size: 0.82rem;
  }

  /* Pace pills */
  .pace-pill {
    display: inline-block;
    background: #1e2a1a;
    color: var(--easy);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Checkbox */
  .check-wrap {
    display: flex;
    align-items: center;
    cursor: pointer;
    margin-left: 4px;
  }
  .check-wrap input[type="checkbox"] {
    display: none;
  }
  .check-box {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: #000;
    background: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .day-check:checked + .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Today highlight */
  .day-today {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 1px var(--accent);
  }
  .day-today .day-name {
    color: var(--accent);
  }
  .day-today .day-date {
    color: var(--accent);
    opacity: 0.7;
  }

  /* Past day (date has passed) */
  .day-past {
    opacity: 0.55;
    border-color: #222 !important;
  }
  .day-past .day-name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .day-past .session-text {
    color: var(--muted);
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 500;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 3px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Race day card */
  .race-day-card {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid #4a4a8a;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .race-day-card .big-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .race-day-card p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
  }

  .race-day-card .target {
    display: inline-block;
    margin-top: 12px;
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    padding: 6px 20px;
    border-radius: 8px;
    letter-spacing: 0.08em;
  }
</style>

    const ASSETS = [self.location.href];

      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));

    });
    self.addEventListener("activate", e => {

    });

let activeWeek = CURRENT_WEEK - 1;

// --- Plan start date: Week 1 = Mon 23 Feb 2026 ---
const PLAN_START = new Date('2026-02-23'); // Monday
// dayOffset: weekIdx * 7 + dayOfWeek (0=Mon..6=Sun)
function getDayDate(weekIdx, dayIdx) {
  const d = new Date(PLAN_START);
  d.setDate(d.getDate() + weekIdx * 7 + dayIdx);
  return d;
}
function getDayLabel(weekIdx, dayIdx) {
  const d = getDayDate(weekIdx, dayIdx);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }).replace(/ /g, ' ');
}

function isDayPast(weekIdx, dayIdx) {
  const dayDate = getDayDate(weekIdx, dayIdx);
  const today = new Date();
  today.setHours(0,0,0,0);
  return dayDate < today;
}

// --- Persistence ---
const STORAGE_KEY = 'hm_plan_completions';
function loadCompletions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveCompletion(weekIdx, dayIdx, checked) {
  const data = loadCompletions();
  const key = `${weekIdx}_${dayIdx}`;
  if (checked) data[key] = true; else delete data[key];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function isCompleted(weekIdx, dayIdx) {
  return !!loadCompletions()[`${weekIdx}_${dayIdx}`];
}

// --- Build all 12 slides once ---
function buildAllSlides() {
  const track = document.getElementById('slideTrack');
  track.innerHTML = '';
  weeks.forEach((week, weekIdx) => {
    const page = document.createElement('div');
    page.className = 'slide-page';
    page.id = `slide_${weekIdx}`;
    page.innerHTML = buildWeekHTML(week, weekIdx);
    track.appendChild(page);
    attachCheckboxListeners(page, weekIdx);
  });
}

function buildWeekHTML(week, weekIdx) {
  let html = `<div class="week-header"><div class="week-label">${week.label}</div>`;
  if (week.tag) {
    const labels = { cutback: 'Cutback Week', taper: 'Taper', race: 'Race Week' };
    html += `<div class="week-tag ${week.tag}">${labels[week.tag]}</div>`;
  } else if (weekIdx === CURRENT_WEEK - 1) {
    html += `<div class="week-tag" style="background:#1a2218;color:var(--easy)">Current</div>`;
  }
  html += `</div>`;

  week.days.forEach((day, dayIdx) => {
    if (day.race) {
      html += `<div class="race-day-card">
        <div class="big-label">🏁 Race Day</div>
        <p>17 May 2026 — Half Marathon</p>
        <div class="target">Target: 1:50:00</div>
      </div>`;
      return;
    }
    const past = isDayPast(weekIdx, dayIdx);
    const isToday = (weekIdx === CURRENT_WEEK - 1) && (dayIdx === CURRENT_DAY);
    const checked = isCompleted(weekIdx, dayIdx);
    html += `<div class="day-card ${past ? 'day-past' : ''} ${isToday ? 'day-today' : ''}" id="card_${weekIdx}_${dayIdx}">
      <div class="day-header">
        <div class="day-dot" style="background:${day.color}"></div>
        <div class="day-name-wrap">
          <div class="day-name">${day.name}</div>
          <div class="day-date">${getDayLabel(weekIdx, dayIdx)}</div>
        </div>
        <div class="day-type">${day.type}</div>
        <label class="check-wrap" onclick="event.stopPropagation()">
          <input type="checkbox" class="day-check" data-week="${weekIdx}" data-day="${dayIdx}" ${checked ? 'checked' : ''}>
          <span class="check-box">${checked ? '✓' : ''}</span>
        </label>
      </div>
      <div class="day-content">
        <div class="session-text ${day.rest ? 'rest-text' : ''}">${day.session}</div>
        ${day.pace ? `<div class="pace-pill">${day.pace}</div>` : ''}
      </div>
    </div>`;
  });
  return html;
}

function attachCheckboxListeners(page, weekIdx) {
  page.querySelectorAll('.day-check').forEach(cb => {
    cb.addEventListener('change', e => {
      const wIdx = parseInt(e.target.dataset.week);
      const dIdx = parseInt(e.target.dataset.day);
      const checked = e.target.checked;
      saveCompletion(wIdx, dIdx, checked);
      const box = e.target.nextElementSibling;
      box.textContent = checked ? '✓' : '';
    });
  });
}

// --- Nav ---
function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (i === activeWeek ? ' active' : '') + (i === CURRENT_WEEK - 1 ? ' current-week' : '') + (w.tag === 'cutback' ? ' cutback' : '');
    btn.textContent = `W${i + 1}`;
    btn.onclick = () => swipeTo(i, i > activeWeek ? 'left' : 'right');
    nav.appendChild(btn);
  });
  // arrows
  document.getElementById('arrowLeft').classList.toggle('hidden', activeWeek === 0);
  document.getElementById('arrowRight').classList.toggle('hidden', activeWeek === weeks.length - 1);
}

function updateProgressBar() {
  const pct = Math.round(((activeWeek + 1) / 12) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Week ${activeWeek + 1} of 12`;
}

// --- Slide animation ---
function positionTrack(weekIdx, animated) {
  const track = document.getElementById('slideTrack');
  if (!animated) track.classList.add('no-transition');
  track.style.transform = `translateX(${-weekIdx * 100}%)`;
  if (!animated) {
    // force reflow then re-enable
    track.getBoundingClientRect();
    track.classList.remove('no-transition');
  }
}

function swipeTo(targetWeek, direction) {
  if (targetWeek < 0 || targetWeek >= weeks.length || targetWeek === activeWeek) return;
  activeWeek = targetWeek;
  positionTrack(activeWeek, true);
  renderWeekNav();
  updateProgressBar();
  setTimeout(() => {
    const nav = document.getElementById('weekNav');
    const active = nav.querySelector('.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

// --- Touch swipe ---
let touchStartX = 0, touchStartY = 0, isSwiping = false;
const viewport = document.querySelector('.slide-viewport') || document;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (isSwiping) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 45) {
    if (dx < 0) swipeTo(activeWeek + 1, 'left');
    else swipeTo(activeWeek - 1, 'right');
  }
  isSwiping = false;
}, { passive: true });

// --- Init ---
function init() {
  buildAllSlides();
  positionTrack(activeWeek, false);
  renderWeekNav();
  updateProgressBar();
}

init();
